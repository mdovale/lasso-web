  - slug: lisa-and-gravitational-wave-detection
    title: LISA & Gravitational-Wave Detection
    summary: >-
      Precision optical metrology for gravitational-wave observatories on
      ground and in space — including picometer structural monitoring of
      the LISA telescope.
    description: |-
      Group members are part of the **LISA Consortium** and the **LIGO
      Scientific Collaboration**, contributing precision-metrology expertise
      from LISA Pathfinder to the characterization and development of
      current and future gravitational-wave observatories.

      For the LISA telescope, we developed an *optical truss
      interferometer*: three compact Fabry-Pérot cavities distributed along
      the telescope structure monitor its dimensional stability at the
      picometer-per-root-hertz level in the millihertz band, ensuring the
      optical pathlength stability that the mission's science requires.

      On the ground, our optomechanical inertial sensors target the seismic
      isolation systems of gravitational-wave detectors, where compact,
      low-noise inertial references directly improve low-frequency
      sensitivity.
    status: active
    order: 5
    tags: [gravitational waves, space missions, interferometry]
