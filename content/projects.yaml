  - slug: compact-heterodyne-interferometry
    title: Compact Heterodyne Laser Interferometry
    summary: >-
      Periodic-error-free heterodyne interferometers with spatially separated
      beams, achieving picometer displacement sensitivity in air and
      sub-picometer performance in vacuum.
    description: |-
      Heterodyne laser interferometry is our workhorse for reading out
      test-mass displacement. Our optical configuration adopts **spatially
      separated two-frequency beams** to prevent frequency and polarization
      mixing, eliminating the periodic errors that plague conventional
      designs.

      By maximizing common-mode beam paths, the interferometer strongly
      rejects environmental disturbances such as temperature fluctuations
      and acoustics. We have verified sensitivities of 3 pm in air, thermal
      stability better than commercial systems by a factor of two, and
      confirmed periodic-error-free performance during stationary and
      dynamic measurements. Quasi-monolithic assemblies reach 0.6 pm/√Hz
      above 1 Hz in vacuum.

      Beyond our own sensors, this technology serves precise stage metrology
      and machine control in industry, and space geodesy missions in
      science. Current work focuses on single-block interferometers and
      fiber-based variants to shrink the system further.
    status: active
    featured: true
    order: 2
    tags: [interferometry, metrology]
    image: /generated/interference.svg
    people:
      - felipe-guzman
      - miguel-dovale
      - daniel-okafor
    publications:
      - joo-2020-heterodyne
      - zhang-2021-noise
      - zhang-2022-quasi-monolithic
    media:
      - interference-pattern
    links: []

  - slug: deep-frequency-modulation-interferometry
    title: Deep Frequency Modulation Interferometry
    summary: >-
      Absolute ranging and displacement sensing with strongly
      frequency-modulated lasers — from fundamental precision limits to
      open-source simulation tools.
    description: |-
      Deep frequency modulation interferometry (DFMI) encodes displacement
      and absolute distance in the harmonics of a strongly frequency-
      modulated laser, enabling multi-fringe readout with a single photodiode
      and a compact optical head.

      We study the **fundamental limits of absolute ranging** with DFMI —
      Fisher-information bounds, carrier-drift effects, and the systematic
      "valleys of robustness" that govern practical accuracy — and develop
      the estimation algorithms needed to reach those limits in real
      instruments.

      The group also maintains [DeepFMKit](https://doi.org/10.1016/j.cpc.2025.109934),
      an open-source Python toolbox with a high-fidelity physics engine and
      interchangeable parameter-estimation algorithms for prototyping DFMI
      systems end to end.
    status: active
    order: 3
    tags: [interferometry, ranging, software]
    image: /generated/dfmi.svg
    people:
      - miguel-dovale
    publications:
      - dovale-2026-dfmi-limits
      - dovale-2026-deepfmkit
    media: []
    links: []

  - slug: odin-inertial-navigation
    title: "ODIN: Distributed Inertial Sensing & Navigation"
    summary: >-
      A gyroscope-free optomechanical instrument — twelve fused-silica
      accelerometers in a cubic configuration — recovering linear and
      angular acceleration for space geodesy and navigation.
    description: |-
      ODIN, the *Optomechanical Distributed Instrument for inertial sensing
      and Navigation*, is a NASA InVEST-funded instrument that recovers the
      full six-degree-of-freedom motion of a spacecraft **without
      gyroscopes**: twelve uniaxial fused-silica optomechanical
      accelerometers arranged in a cubic configuration measure both linear
      and angular acceleration.

      The instrument builds directly on our monolithic resonator and compact
      interferometer technologies, packaging them for the space environment.
      ODIN is planned to fly on the **GRATTIS mission in 2027**, which will
      demonstrate gravitational-reference-sensor technology for future Earth
      geodesy missions on an ESPA-class microsatellite.

      This project spans sensor fabrication, interferometric readout,
      thermal and vibration qualification, and the estimation algorithms
      that fuse twelve acceleration channels into navigation-grade motion
      states.
    status: active
    featured: true
    order: 4
    tags: [space missions, inertial sensing, navigation]
    image: /generated/odin.svg
    people:
