projects:
  - slug: optomechanical-inertial-sensors
    title: Optomechanical Inertial Sensors
    summary: >-
      Compact, monolithic fused-silica resonators with laser-interferometric
      readout, reaching nano-g acceleration sensitivities for gravimetry,
      seismology, and inertial navigation.
    description: |-
      Mechanical resonators fabricated monolithically from fused silica are
      the core sensing element of our accelerometers. Because the test mass,
      flexures, and frame are carved from a single low-loss wafer, these
      devices reach mechanical quality factors in the millions and
      **mQ-products above 1000 kg** — the key figure of merit for thermal-
      noise-limited acceleration sensing.

      We pair these resonators with compact laser interferometers that read
      out test-mass displacement at the level of 10⁻¹⁶ m/√Hz, translating to
      acceleration noise floors below 100 ng/√Hz over a 10 kHz bandwidth,
      and near 10⁻¹¹ m s⁻²/√Hz at low frequencies. The result is a family of
      sensors that are small, portable, vacuum compatible, and free of the
      electric-field noise that limits capacitive readouts.

      Applications range from gravimetry, geodesy, and seismology to
      inertial navigation on low-SWaP platforms and flight payloads. We
      study new materials and fabrication methods, model and fabricate the
      resonators, and characterize complete sensor systems in vacuum.
    status: active
    featured: true
    order: 1
    tags: [optomechanics, inertial sensing, geodesy]
    image: /generated/resonator.svg
    people:
