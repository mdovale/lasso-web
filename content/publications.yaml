# HOW TO ADD A PUBLICATION
#   1. Copy an existing entry (from "- id:" down to the blank line).
#   2. Give it a unique lowercase "id" like "lastname-2026-topic".
#   3. Fill in title, authors (one per line), year, venue.
#   4. Optional fields: volumePages, doi (just the DOI, no URL),
#      arxiv (full URL), pdf (file in public/publications/ or URL),
#      url (publisher page), tags, featured, citation.
#   5. Set "featured: true" on at most 3–4 papers — they appear
#      on the homepage.
#   6. Run: npm run validate:content
# ============================================================

