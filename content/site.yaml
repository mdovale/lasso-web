name: Laboratory of Space Systems and Optomechanics
shortName: LASSO
tagline: Precision measurement for the next generation of space science.

# Used for search engines and social-media previews (1–2 sentences).
description: >-
  LASSO at the University of Arizona develops high-precision laser
  interferometry and optomechanical sensing technologies for inertial
  sensing and navigation, Earth observation, and gravitational-wave
  detection on ground and in space.

# The production URL of the site (no trailing slash). Update after deployment.
